version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: calaro-db
    environment:
      POSTGRES_USER: calaro
      POSTGRES_PASSWORD: calaro
      POSTGRES_DB: calaro
    volumes:
      - calaro_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calaro -d calaro"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: calaro-backend
    env_file:
      - backend/.env.example
    environment:
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://calaro:calaro@db:5432/calaro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: calaro-frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:8000/api/v1"
    ports:
      - "5173:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: calaro-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: calaro-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  adminer:
    image: adminer:latest
    container_name: calaro-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  calaro_db_data:

